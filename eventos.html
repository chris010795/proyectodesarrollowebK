<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Eventos</title>
    <link rel="stylesheet" href="Styles/calendario.css">
</head>
<body>
<header class="main-header">
    <div class="header-container">
        <div class="logo-area">
            <img src="images/LOGO_2.png" class="logo-img" alt="Logo">
            <span class="brand-name">Inversiones Cabrera</span>
        </div>
        <nav class="header-nav">
            <a href="index.html">Inicio</a>
        </nav>
    </div>
    <div class="hero-banner">
        <div class="hero-text">
            <h1>Calendario de Eventos</h1>
            <p>Organiza, busca y gestiona tus actividades</p>
        </div>
        <div class="hero-logo-box">
            <img src="images/LOGO.png" alt="Logo">
        </div>
    </div>
</header>
<main class="calendar-container">
    <section class="search-panel">
        <h2>Buscar fecha</h2>
        <div class="search-fields">
            <div class="field">
                <label>Día</label>
                <input type="number" id="search-day" min="1" max="31">
            </div>
            <div class="field">
                <label>Mes</label>
                <select id="search-month">
                    <option value="0">Enero</option>
                    <option value="1">Febrero</option>
                    <option value="2">Marzo</option>
                    <option value="3">Abril</option>
                    <option value="4">Mayo</option>
                    <option value="5">Junio</option>
                    <option value="6">Julio</option>
                    <option value="7">Agosto</option>
                    <option value="8">Septiembre</option>
                    <option value="9">Octubre</option>
                    <option value="10">Noviembre</option>
                    <option value="11">Diciembre</option>
                </select>
            </div>
            <div class="field">
                <label>Año</label>
                <input type="number" id="search-year">
            </div>
        </div>
        <div class="search-buttons">
            <button id="btn-search">Buscar</button>
            <button id="btn-today">Hoy</button>
        </div>
        <p id="search-message"></p>
    </section>
    <section class="calendar-nav">
        <button id="prev-month">◀</button>
        <h2 id="month-title"></h2>
        <button id="next-month">▶</button>
    </section>
    <section class="calendar-weekdays">
        <div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div>
        <div>Jue</div><div>Vie</div><div>Sáb</div>
    </section>
    <section id="calendar-days" class="calendar-days"></section>
    <section class="event-panel">
        <h3 id="selected-date">Selecciona un día</h3>
        <div class="field">
            <label>Título</label>
            <input type="text" id="event-input">
        </div>
        <div class="field">
            <label>Hora</label>
            <input type="time" id="event-time">
        </div>
        <div class="field">
            <label>Lugar</label>
            <input type="text" id="event-place">
        </div>
        <div class="field">
            <label>Descripción</label>
            <input type="text" id="event-desc">
        </div>
        <div class="event-buttons">
            <button id="btn-save-event">Guardar</button>
            <button id="btn-delete-event">Eliminar</button>
        </div>
        <p id="event-message"></p>
    </section>
</main>
<footer class="main-footer">
    <div class="footer-content">
        <img src="images/LOGO_2.png" class="footer-logo" alt="Logo footer">
        <p>Tu bodega de abarrotes de confianza. Calidad y precio justo.</p>
    </div>
    <div class="footer-bottom">
        <p>© 2025 Inversiones Cabrera. Todos los derechos reservados.</p>
    </div>
</footer>
<script src="javascript/calendario.js"></script>
</body>
</html>
