<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redes Sociales</title>
    <link rel="stylesheet" href="styles/calendario.css">
    <link rel="stylesheet" href="styles/redes.css">
</head>
<body>
<nav>
    <a href="index.html">Inicio</a>
    <a href="eventos.html">Eventos</a>
    <a href="redes.html">Redes</a>
</nav>
<main class="calendar-container">
    <header class="calendar-header">
        <h1>Redes Sociales</h1>
        <p>Conéctate con nosotros</p>
    </header>
    <section class="social-section">
        <article class="social-card">
            <img src="images/Facebook.webp" alt="Facebook" width="90" height="90">
            <h2>Facebook</h2>
            <p>Noticias, eventos y contenido actualizado.</p>
            <a href="https://facebook.com" target="_blank">Visitar</a>
        </article>
        <article class="social-card">
            <img src="images/Instagram1.webp" alt="Instagram" width="90" height="90">
            <h2>Instagram</h2>
            <p>Contenido visual y promociones.</p>
            <a href="https://instagram.com" target="_blank">Visitar</a>
        </article>
        <article class="social-card">
            <img src="images/x_logo.webp" alt="X" width="90" height="90">
            <h2>X</h2>
            <p>Actualizaciones rápidas y noticias.</p>
            <a href="https://twitter.com" target="_blank">Visitar</a>
        </article>
    </section>
</main>
<script src="javascript/redes.js"></script>
</body>
</html>
